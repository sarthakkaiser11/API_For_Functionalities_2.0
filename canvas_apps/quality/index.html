<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quality Canvas | Data Observability</title>
    <link rel="stylesheet" href="../shared/design-system.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        .column-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .column-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 1.5rem;
            position: relative;
            overflow: hidden;
        }

        .health-bar {
            height: 4px;
            background: #333;
            border-radius: 2px;
            margin: 1rem 0;
            overflow: hidden;
        }

        .health-fill {
            height: 100%;
            background: var(--accent-primary);
            transition: width 1s ease-out;
        }

        .badge {
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 10px;
            background: rgba(0, 210, 255, 0.1);
            color: var(--accent-primary);
            text-transform: uppercase;
            font-weight: 700;
        }

        .fingerprint {
            font-family: monospace;
            font-size: 0.75rem;
            color: var(--text-secondary);
            opacity: 0.5;
            margin-top: 1rem;
        }

        .search-area {
            margin-bottom: 2rem;
            display: flex;
            gap: 1rem;
        }

        input {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 0.8rem 1.2rem;
            color: white;
            font-family: inherit;
        }

        button {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            border: none;
            border-radius: 12px;
            padding: 0.8rem 2rem;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:hover {
            opacity: 0.9;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="glass-card">
            <header>
                <h1>Quality Canvas</h1>
                <p style="color: var(--text-secondary)">Deep-dive into column-level health metrics and data integrity.
                </p>
            </header>

            <div class="search-area">
                <input type="text" id="tablePath" placeholder="catalog.schema.table"
                    value="intelliegencedatacatalog.functionalities.sample_table">
                <button onclick="fetchQuality()">Inspect Quality</button>
            </div>

            <div id="loader" style="display: none; text-align: center; padding: 2rem;">
                <span class="loader"></span>
            </div>

            <div id="columnGrid" class="column-grid">
                <!-- Columns will be injected here -->
            </div>

            <div id="errorArea" class="error-msg" style="display: none;"></div>
        </div>
    </div>

    <script>
        const API_BASE = "http://127.0.0.1:8000";

        async function fetchQuality() {
            const path = document.getElementById('tablePath').value;
            const loader = document.getElementById('loader');
            const grid = document.getElementById('columnGrid');
            const errorArea = document.getElementById('errorArea');

            if (!path) return;

            loader.style.display = 'block';
            grid.innerHTML = '';
            errorArea.style.display = 'none';

            try {
                const response = await fetch(`${API_BASE}/stats/quality/${path}`);
                if (!response.ok) throw new Error("Could not fetch quality data.");

                const columns = await response.json();
                renderColumns(columns);

                loader.style.display = 'none';
            } catch (err) {
                loader.style.display = 'none';
                errorArea.textContent = err.message;
                errorArea.style.display = 'block';
            }
        }

        function renderColumns(columns) {
            const grid = document.getElementById('columnGrid');
            grid.innerHTML = columns.map(col => {
                const healthScore = 100 - (col.null_percentage || 0);
                const healthColor = healthScore > 95 ? 'var(--success)' : (healthScore > 80 ? 'var(--warning)' : 'var(--danger)');

                return `
                    <div class="column-card">
                        <div style="display: flex; justify-content: space-between; align-items: start;">
                            <h3 style="margin: 0; font-size: 1.1rem;">${col.column_name}</h3>
                            <span class="badge">${col.data_type || 'UNKNOWN'}</span>
                        </div>
                        
                        <div class="health-bar">
                            <div class="health-fill" style="width: ${healthScore}%; background: ${healthColor}"></div>
                        </div>
                        
                        <div style="display: flex; justify-content: space-between; font-size: 0.85rem;">
                            <span style="color: var(--text-secondary)">Null Percentage</span>
                            <span style="font-weight: 700; color: ${healthColor}">${col.null_percentage?.toFixed(2)}%</span>
                        </div>
                        
                        <div style="display: flex; justify-content: space-between; font-size: 0.85rem; margin-top: 0.5rem;">
                            <span style="color: var(--text-secondary)">Distinct Values</span>
                            <span style="font-weight: 700;">${col.distinct_count || 0}</span>
                        </div>

                        <div class="fingerprint">FP: ${col.fingerprint || 'N/A'}</div>
                    </div>
                `;
            }).join('');
        }
    </script>
</body>

</html>
